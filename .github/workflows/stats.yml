name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: DEmmaRL
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Mexico_City
          
          # Languages Plugin
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 10
          plugin_languages_sections: most-used
          
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
          plugin_wakatime_days: 7
          plugin_wakatime_sections: languages, editors, os

          # Achievements Plugin
          plugin_achievements: yes
          plugin_achievements_threshold: A
          plugin_achievements_display: compact

          plugin_notable: yes
          plugin_notable_from: all 
          plugin_notable_types: commit, pull_request

          plugin_pagespeed: yes
          plugin_pagespeed_url: https://demmarl.dev
          plugin_pagespeed_detailed: yes
          plugin_pagespeed_screenshot: yes

          # Layout Configuration
          config_order: base.header, languages, wakatime, notable, achievements, pagespeed
