name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: DEmmaRL
          template: classic
          base: activity, community, repositories, metadata
          config_timezone: America/Mexico_City
          config_display: compact
          
          # Languages Plugin
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 10
          
          # Detailed WakaTime Plugin
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
          plugin_wakatime_days: 7
          plugin_wakatime_limit: 10
          plugin_wakatime_sections: languages, editors, os, projects
          plugin_wakatime_details: percentage, time

          # Achievements Plugin
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_display: compact

          # Notable Contributions (Includes Slidev and Open Source work)
          plugin_notable: yes
          plugin_notable_from: all
          plugin_notable_types: commit, pull_request

          # Layout: Prioritizing engineering output
          config_order: languages, wakatime, notable, achievements
